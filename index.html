<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>หม้อแม่มดผสมคำ — ฝึกอ่านสะกดคำ</title>
    <meta name="theme-color" content="#5a3aa8" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="หม้อแม่มด" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" type="image/png" href="icons/icon-192.png" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700;800&family=Mali:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <!-- [0]+[3] ฉาก + เอฟเฟกต์ + แม่มด -->
    <div id="sceneRoot">
      <canvas id="bgCanvas"></canvas>
      <!-- [1] ภาพกล้อง AR (mirror) — แสดงเฉพาะเมื่อ AR mode เปิดสำเร็จ -->
      <video id="camVideo" playsinline muted aria-hidden="true"></video>
      <!-- ฟิลเตอร์ม่วงโซนล่าง บังภาพกล้อง (แสดงคู่กับ camVideo ผ่าน CSS sibling) -->
      <div id="camShade" aria-hidden="true"></div>
      <!-- [1.5] หม้อแม่มด — DOM img สลับ frame ตาม game state -->
      <img id="cauldronImg" class="cauldron-img" src="public/assets/images/cauldron1.png" alt="" aria-hidden="true" />
      <canvas id="fxCanvas"></canvas>
      <img src="public/assets/images/wish%20happy.gif" class="witch idle" alt="แม่มด" aria-hidden="true" />
      <!-- [2.5] เจ้าหญิง — กลายร่างตามคะแนน, ด้านขวา -->
      <img id="princessImg" class="princess-img" src="public/assets/images/princess_1.png" alt="เจ้าหญิง" aria-hidden="true" />
      <div id="toast" class="toast"></div>
    </div>

    <!-- [4] UI overlay -->
    <header id="hud" class="hud hidden">
      <button id="backBtn" class="btn-back" title="กลับ">
        <img src="public/assets/images/Arrow.png" alt="กลับ" class="back-arrow-img" />
      </button>
      <div class="hud-pill score-pill" id="scorePill">
        <span class="pill-label">คะแนน</span>
        <div class="score-display">
          <span class="score-icon" id="scoreIcon">⭐</span>
          <div class="score-roller">
            <span id="hudScore" class="pill-value">0</span>
          </div>
        </div>
      </div>
      <div class="hud-center">
        <span id="hudName" class="hud-name"></span>
        <span id="hudProgress" class="hud-progress"></span>
      </div>
      <div class="hud-pill word-pill">
        <span class="pill-label">คำ</span>
        <span id="hudWord" class="pill-value">—</span>
      </div>
    </header>

    <!-- คะแนนสะสม (ข้ามทุกมาตรา) — fixed มุมขวาบนทุกหน้ายกเว้นหน้าเริ่ม
         เป็นเป้าหมายที่หน้าสรุปดาวบินไปหาตอนกดกลับเลือกมาตรา -->
    <div id="totalScoreBadge" class="hud-pill total-badge hidden">
      <span class="pill-label">คะแนนสะสม</span>
      <div class="score-display">
        <span class="score-icon">🏆</span>
        <span id="totalScoreValue" class="pill-value">0</span>
      </div>
    </div>

    <!-- voicebar: ด่านอ่านออกเสียง -->
    <div id="voicebar" class="voicebar hidden">
      <div class="vb-prompt">&#x2728; อ่านคำนี้ให้แม่มดฟัง</div>
      <!-- word + orbiting stars -->
      <div class="vb-word-wrap">
        <div class="vb-stars-orbit" aria-hidden="true">
          <span class="vs s1">&#x2726;</span>
          <span class="vs s2">&#x2605;</span>
          <span class="vs s3">&#x2727;</span>
          <span class="vs s4">&#x2726;</span>
          <span class="vs s5">&#x2605;</span>
          <span class="vs s6">&#x2727;</span>
        </div>
        <div id="wordBig" class="vb-word">—</div>
      </div>
      <div id="vbPoints" class="vb-points" aria-hidden="true">+100</div>
      <div id="hint" class="vb-hint"></div>
      <div class="vb-fallback">
        <button id="okBtn" class="btn-ok">&#x2705; อ่านถูก</button>
        <button id="retryBtn" class="btn-retry">&#x1F501; ลองใหม่</button>
      </div>
      <!-- mic: วงกลมแก้วใสสไตล์เวทมนตร์ -->
      <button id="micBtn" class="btn-mic" title="พูดคำนี้">
        <svg class="mic-svg" viewBox="0 0 24 38" fill="none" aria-hidden="true">
          <rect x="6" y="1" width="12" height="20" rx="6" fill="currentColor"/>
          <path d="M3 19c0 5.52 4.48 9 9 9s9-3.48 9-9" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"/>
          <line x1="12" y1="28" x2="12" y2="35" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"/>
          <line x1="7"  y1="35" x2="17" y2="35" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"/>
        </svg>
      </button>
      <div id="micState" class="vb-state"></div>
    </div>

    <!-- หน้าเริ่ม -->
    <div id="startScreen" class="screen start">
      <div class="start-card">
        <div class="start-emoji"><img src="public/assets/images/wish%20home%20page.gif" alt="แม่มด" class="start-witch-img" />&#x2728;</div>
        <h1>หม้อแม่มดผสมคำ</h1>
        <p>ฝึกอ่านสะกดคำภาษาไทยตามมาตราตัวสะกด</p>
        <!-- ลูกแก้วเวทมนตร์ — ปุ่มเริ่มเล่น -->
        <div class="glass-ball-wrap">
          <div class="gb-outer-glow" aria-hidden="true"></div>
          <button id="startBtn" class="glass-ball-btn" type="button">
            <img src="public/assets/images/glass%20ball.png" class="glass-ball-img" alt="" aria-hidden="true"/>
            <span class="gb-shine" aria-hidden="true"></span>
            <span class="glass-ball-text">เริ่มเล่น</span>
            <span class="gb-spark s1" aria-hidden="true">✦</span>
            <span class="gb-spark s2" aria-hidden="true">⭐</span>
            <span class="gb-spark s3" aria-hidden="true">✧</span>
            <span class="gb-spark s4" aria-hidden="true">✦</span>
            <span class="gb-spark s5" aria-hidden="true">⭐</span>
          </button>
        </div>
        <button id="installBtn" class="btn-install hidden">📲 ติดตั้งแอป</button>
        <button id="arToggleBtn" class="btn-install" type="button">📷 โหมด AR: เปิด</button>
        <button id="startAdultBtn" class="btn-link">สำหรับผู้ปกครอง</button>
      </div>
      <div class="app-version">v66</div>
    </div>

    <!-- หน้าเลือกมาตรา -->
    <div id="levelScreen" class="screen level hidden">
      <h2>เลือกมาตราตัวสะกด</h2>
      <div id="levelGrid" class="level-grid"></div>
      <button id="levelAdultBtn" class="btn-link">สำหรับผู้ปกครอง</button>
    </div>

    <!-- หน้าผู้ปกครอง -->
    <div id="adultScreen" class="screen adult"></div>

    <!-- ผลคะแนนหลังจบมาตรา -->
    <div id="resultScreen" class="screen result hidden">
      <div class="result-card" id="resultCard">
        <div class="result-emoji"><img id="resultCharImg" class="result-witch-img" src="" alt="" /></div>
        <div id="resultStars" class="result-stars"></div>
        <div id="resultMsg" class="result-msg"></div>
        <div class="result-total">
          <span class="result-total-label">คะแนนสะสม</span>
          <span id="resultTotalValue" class="result-total-value">0</span>
        </div>
        <button id="resultBtn" class="btn-primary big">&#x1F3E0; กลับเลือกมาตรา</button>
      </div>
    </div>

    <!-- ห้องฝึกไพ่เวทมนตร์ก่อนเข้าหม้อ — อุ่นเครื่อง เล่นครั้งแรกที่ปลดล็อกมาตรานั้นเท่านั้น -->
    <div id="mahjongScreen" class="screen mahjong hidden">
      <button id="mahjongBackBtn" class="btn-back" title="กลับ">
        <img src="public/assets/images/Arrow.png" alt="กลับ" class="back-arrow-img" />
      </button>
      <h2 id="mahjongTitle">&#x2728; จับคู่ไพ่คำ</h2>
      <div id="mahjongTray" class="mj-tray">
        <div class="mj-tray-slot"></div>
        <div class="mj-tray-slot"></div>
        <div class="mj-tray-slot"></div>
        <div class="mj-tray-slot"></div>
        <div class="mj-tray-slot"></div>
        <div id="mahjongBigWord" class="mj-big-word"></div>
      </div>
      <div id="mahjongBoard" class="mj-board"></div>
      <button id="mahjongShuffleBtn" class="btn-primary mj-shuffle-btn">&#x1F500; สลับป้าย</button>
      <img id="mahjongHandCursor" class="mj-hand-cursor hidden" src="public/assets/images/Hand%20click.png" alt="" aria-hidden="true" />
      <img class="mj-witch-img" src="public/assets/images/wish%20happy.gif" alt="" aria-hidden="true" />
    </div>

    <!-- วิดีโอนำเรื่องหน้าแรก — เล่นครั้งเดียวหลังกดปุ่ม "เริ่มเล่น" ก่อนเข้าหน้าเลือกมาตรา -->
    <div id="videoOverlay" class="video-overlay hidden" aria-hidden="true">
      <video id="introVideo" playsinline webkit-playsinline preload="metadata"></video>
      <div id="videoFade" class="video-fade"></div>
      <button id="skipVideoBtn" class="btn-skip-video">ข้าม ›</button>
    </div>

    <!-- หน้าม่วงแม่มดน้อยพูดชวนมาปราบแม่มดใจร้าย — ต่อจากวิดีโอนำ ก่อนเข้าหน้าเลือกมาตรา -->
    <div id="introOverlay" class="intro-overlay hidden" aria-hidden="true">
      <img src="public/assets/images/wishtalk2.gif" class="intro-witch-img" alt="" aria-hidden="true" />
    </div>

    <script type="module" src="src/main.js"></script>
    <!-- ปุ่มรีเซ็ต progress — แสดงเฉพาะหน้าเลือกมาตรา, มุมล่างขวา -->
    <button id="resetProgressBtn" class="btn-reset-game hidden">↺ รีเซ็ตเกม</button>

    <!-- แสงวิเศษลอยรอบขอบหน้าจอ — แสดงเฉพาะหน้าเลือกมาตรา -->
    <div id="magicOrbs" class="magic-orbs hidden" aria-hidden="true">
      <span></span><span></span><span></span>
      <span></span><span></span><span></span>
    </div>

    <script>
      // ลงทะเบียน Service Worker — เฉพาะ secure context (https/localhost), ไม่ทำงานบน file://
      if ('serviceWorker' in navigator && location.protocol !== 'file:') {
        window.addEventListener('load', () => {
          // updateViaCache:'none' → browser ตรวจ sw.js จาก network เสมอ ไม่ติด HTTP cache
          navigator.serviceWorker.register('sw.js', { updateViaCache: 'none' })
            .then((reg) => {
              // ตรวจ update ทุก 5 นาที (กัน browser ไม่ poll เอง)
              setInterval(() => reg.update(), 5 * 60 * 1000);
            })
            .catch((e) => console.warn('SW:', e));
        });
        // SW version ใหม่ activate → reload อัตโนมัติ รับ code ล่าสุดทันที
        navigator.serviceWorker.addEventListener('message', (e) => {
          if (e.data?.type === 'SW_UPDATED') location.reload();
        });
      }
    </script>
  </body>
</html>
