# Deploy เกม (static PWA) ขึ้น GitHub Pages อัตโนมัติทุกครั้งที่ push ขึ้น main
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          # เกมเป็น static ทั้งหมด — อัปโหลดทั้งโฟลเดอร์
          path: .
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
